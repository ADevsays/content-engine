services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "${HOST_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${N8N_DOMAIN}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=false
      - N8N_ENVS_TO_BYPASS=ELEVENLABS_API_KEY
      - CREDENTIALS_OVERWRITE_DATA={"telegramApi":{"accessToken":"$TELEGRAM_BOT_TOKEN"},"supabaseApi":{"host":"$SUPABASE_URL","apiKey":"$SUPABASE_API_KEY"},"postgres":{"host":"$POSTGRES_HOST","port":$POSTGRES_PORT,"database":"$POSTGRES_DB","user":"$POSTGRES_USER","password":"$POSTGRES_PASSWORD"},"cohereApi":{"apiKey":"$COHERE_API_KEY"},"googlePalmApi":{"apiKey":"$GOOGLE_GEMINI_API_KEY"},"notionApi":{"apiKey":"$NOTION_API_KEY"},"googleDriveOAuth2Api":{"clientId":"$GOOGLE_CLIENT_ID","clientSecret":"$GOOGLE_CLIENT_SECRET"}}
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-importador:
    image: docker.n8n.io/n8nio/n8n:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Esperando a que n8n inicialice...' &&
      sleep 15 &&
      echo 'Importando credenciales...' &&
      n8n import:credentials --input=/tmp/credentials.json &&
      echo 'Importando flujos de trabajo...' &&
      n8n import:workflow --separate --input=/tmp/workflows &&
      echo '¡Importación completada!'
      "
    volumes:
      - n8n_data:/home/node/.n8n
      - ./credentials.json:/tmp/credentials.json
      - ./workflows:/tmp/workflows
    depends_on:
      - n8n

volumes:
  n8n_data:
